name: Dashboard Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Sync mode
        required: false
        default: sync
        type: choice
        options:
          - sync
          - start
          - end
      project:
        description: Project name from dashboard/config/projects.json (leave empty for all)
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 18 * * 1-5"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync dashboard data from GitHub Projects API
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: >
          node scripts/sync-dashboard-from-github.js
          --mode "${{ github.event.inputs.mode || 'sync' }}"
          --project "${{ github.event.inputs.project || '' }}"

      - name: Commit updated dashboard data
        env:
          DASHBOARD_SYNC_MODE: ${{ github.event.inputs.mode || 'sync' }}
          DASHBOARD_SYNC_PROJECT: ${{ github.event.inputs.project || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/sprints.json dashboard/data/api-snapshots.json
          if git diff --cached --quiet; then
            echo "No dashboard changes."
          else
            if [ -n "$DASHBOARD_SYNC_PROJECT" ]; then
              git commit -m "chore: ${DASHBOARD_SYNC_MODE} dashboard data for ${DASHBOARD_SYNC_PROJECT}"
            else
              git commit -m "chore: ${DASHBOARD_SYNC_MODE} dashboard data from GitHub API"
            fi
            git push
          fi
